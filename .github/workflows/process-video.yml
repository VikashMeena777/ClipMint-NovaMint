# ClipMint — Video Processing Pipeline
#
# Triggered by Supabase webhook or manual dispatch.
# Downloads video → transcribes → AI analysis → clips → captions → uploads
#
name: Process Video

on:
  workflow_dispatch:
    inputs:
      job_id:
        description: "Supabase job ID"
        required: true
        type: string
      video_url:
        description: "Video URL to process (YouTube, Instagram, etc.)"
        required: true
        type: string
      caption_style:
        description: "Caption style preset"
        required: false
        default: "hormozi"
        type: choice
        options:
          - hormozi
          - bounce
          - fade
          - glow
          - typewriter
          - glitch
          - neon
          - colorful
          - minimal
      max_clips:
        description: "Maximum number of clips to generate"
        required: false
        default: "10"
        type: string

env:
  NODE_VERSION: "20"
  PYTHON_VERSION: "3.11"
  FFMPEG_THREADS: "2"

jobs:
  process:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ─────────────────────────────────────────────────────────────
      # 1. Setup
      # ─────────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: "npm"
          cache-dependency-path: remotion-captions/package-lock.json

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ env.PYTHON_VERSION }}

      - name: Install system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg imagemagick
          pip install yt-dlp google-api-python-client google-auth-httplib2 google-auth-oauthlib

      - name: Install Remotion dependencies
        working-directory: remotion-captions
        run: npm ci

      # ─────────────────────────────────────────────────────────────
      # 2. Download Source Video
      # ─────────────────────────────────────────────────────────────
      - name: Download video
        id: download
        run: |
          mkdir -p workspace/source workspace/audio workspace/clips workspace/captioned workspace/thumbnails
          
          echo "📥 Downloading video from: ${{ inputs.video_url }}"
          yt-dlp \
            --format "bestvideo[height<=1080]+bestaudio/best[height<=1080]" \
            --merge-output-format mp4 \
            --output "workspace/source/source.mp4" \
            --no-playlist \
            --socket-timeout 30 \
            "${{ inputs.video_url }}"
          
          # Get video duration
          DURATION=$(ffprobe -v quiet -show_entries format=duration -of csv=p=0 workspace/source/source.mp4)
          echo "duration=$DURATION" >> $GITHUB_OUTPUT
          echo "✅ Downloaded. Duration: ${DURATION}s"

      # ─────────────────────────────────────────────────────────────
      # 3. Extract Audio for Transcription
      # ─────────────────────────────────────────────────────────────
      - name: Extract audio
        run: |
          echo "🎵 Extracting audio..."
          ffmpeg -i workspace/source/source.mp4 \
            -vn -acodec pcm_s16le -ar 16000 -ac 1 \
            workspace/audio/audio.wav \
            -y -loglevel warning
          echo "✅ Audio extracted"

      # ─────────────────────────────────────────────────────────────
      # 4. Transcribe with Whisper (via API)
      # ─────────────────────────────────────────────────────────────
      - name: Transcribe audio
        id: transcribe
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🗣️ Transcribing audio..."
          
          # Use Groq Whisper API for transcription (free tier: whisper-large-v3-turbo)
          # Split audio into 25MB chunks if needed (Groq limit)
          FILE_SIZE=$(stat -f%z workspace/audio/audio.wav 2>/dev/null || stat --printf="%s" workspace/audio/audio.wav)
          MAX_SIZE=25000000
          
          if [ "$FILE_SIZE" -gt "$MAX_SIZE" ]; then
            echo "⚠️ Audio file too large ($FILE_SIZE bytes), splitting..."
            ffmpeg -i workspace/audio/audio.wav -f segment -segment_time 300 \
              -c copy workspace/audio/chunk_%03d.wav -y -loglevel warning
          else
            cp workspace/audio/audio.wav workspace/audio/chunk_000.wav
          fi
          
          # Transcribe each chunk
          > workspace/audio/full_transcript.srt
          OFFSET=0
          
          for chunk in workspace/audio/chunk_*.wav; do
            echo "  Transcribing $chunk..."
            
            RESPONSE=$(curl -s -X POST "https://api.groq.com/openai/v1/audio/transcriptions" \
              -H "Authorization: Bearer $GROQ_API_KEY" \
              -F "file=@$chunk" \
              -F "model=whisper-large-v3-turbo" \
              -F "response_format=srt" \
              -F "language=en")
            
            echo "$RESPONSE" >> workspace/audio/full_transcript.srt
            echo "" >> workspace/audio/full_transcript.srt
          done
          
          echo "✅ Transcription complete"
          echo "srt_path=workspace/audio/full_transcript.srt" >> $GITHUB_OUTPUT

      # ─────────────────────────────────────────────────────────────
      # 5. AI Analysis — Find Viral Moments
      # ─────────────────────────────────────────────────────────────
      - name: AI viral moment detection
        id: ai_analysis
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🧠 Analyzing transcript for viral moments..."
          
          TRANSCRIPT=$(cat workspace/audio/full_transcript.srt)
          MAX_CLIPS=${{ inputs.max_clips }}
          
          # Call Groq LLaMA for viral moment detection
          RESPONSE=$(curl -s -X POST "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d "$(cat <<EOF
          {
            "model": "llama-3.3-70b-versatile",
            "messages": [
              {
                "role": "system",
                "content": "You are a viral content expert. Analyze the transcript and identify the top ${MAX_CLIPS} moments that would make viral short-form clips. Return ONLY valid JSON."
              },
              {
                "role": "user",
                "content": "Analyze this SRT transcript and find the top ${MAX_CLIPS} viral-worthy moments.\n\nFor each moment, provide:\n- start_time: start timestamp in seconds (float)\n- end_time: end timestamp in seconds (float) \n- viral_score: 1-100 rating\n- title: catchy title for the clip\n- description: brief description\n- hashtags: array of 5 relevant hashtags\n- hook: compelling first-line hook caption\n\nReturn as JSON array.\n\nTranscript:\n${TRANSCRIPT}"
              }
            ],
            "temperature": 0.7,
            "max_tokens": 4096,
            "response_format": {"type": "json_object"}
          }
          EOF
          )")
          
          echo "$RESPONSE" | python3 -c "
          import sys, json
          data = json.load(sys.stdin)
          content = data['choices'][0]['message']['content']
          with open('workspace/clips/viral_moments.json', 'w') as f:
              f.write(content)
          print('✅ Found viral moments')
          "

      # ─────────────────────────────────────────────────────────────
      # 6. FFmpeg — Split Video into Clips
      # ─────────────────────────────────────────────────────────────
      - name: Split video into clips
        run: |
          echo "✂️ Splitting video into clips..."
          
          python3 << 'PYTHON'
          import json, subprocess, os
          
          with open('workspace/clips/viral_moments.json') as f:
              data = json.loads(f.read())
          
          # Handle both {"clips": [...]} and [...] formats
          moments = data.get('clips', data) if isinstance(data, dict) else data
          
          for i, moment in enumerate(moments):
              start = float(moment['start_time'])
              end = float(moment['end_time'])
              duration = end - start
              
              # Enforce min 15s, max 60s clips
              if duration < 15:
                  end = start + 15
                  duration = 15
              elif duration > 60:
                  end = start + 60
                  duration = 60
              
              output = f"workspace/clips/clip_{i:03d}.mp4"
              
              cmd = [
                  'ffmpeg', '-i', 'workspace/source/source.mp4',
                  '-ss', str(start), '-t', str(duration),
                  '-c:v', 'libx264', '-preset', 'fast',
                  '-c:a', 'aac', '-b:a', '128k',
                  '-movflags', '+faststart',
                  output, '-y', '-loglevel', 'warning'
              ]
              
              subprocess.run(cmd, check=True)
              print(f"  ✅ Clip {i}: {start:.1f}s → {end:.1f}s ({duration:.1f}s)")
              
              # Extract clip-specific SRT
              srt_cmd = [
                  'ffmpeg', '-i', 'workspace/audio/full_transcript.srt',
                  '-ss', str(start), '-t', str(duration),
                  f'workspace/clips/clip_{i:03d}.srt',
                  '-y', '-loglevel', 'warning'
              ]
              # SRT extraction may fail — will fall back to full transcript
              try:
                  subprocess.run(srt_cmd, check=True)
              except:
                  pass
          
          print(f"✅ Split into {len(moments)} clips")
          PYTHON

      # ─────────────────────────────────────────────────────────────
      # 7. Remotion — Render Animated Captions
      # ─────────────────────────────────────────────────────────────
      - name: Render captioned clips
        working-directory: remotion-captions
        run: |
          echo "🎬 Rendering animated captions with Remotion..."
          
          STYLE="${{ inputs.caption_style }}"
          
          for clip in ../workspace/clips/clip_*.mp4; do
            BASENAME=$(basename "$clip" .mp4)
            SRT_FILE="../workspace/clips/${BASENAME}.srt"
            OUTPUT="../workspace/captioned/${BASENAME}_captioned.mp4"
            
            # Use clip-specific SRT if available, otherwise use full transcript
            if [ -f "$SRT_FILE" ]; then
              SRT_CONTENT=$(cat "$SRT_FILE")
            else
              SRT_CONTENT=$(cat ../workspace/audio/full_transcript.srt)
            fi
            
            echo "  Rendering $BASENAME with $STYLE style..."
            
            npx remotion render CaptionedClip "$OUTPUT" \
              --props="$(echo "{\"srtContent\": $(echo "$SRT_CONTENT" | python3 -c 'import sys,json; print(json.dumps(sys.stdin.read()))'), \"captionStyle\": \"$STYLE\", \"backgroundColor\": \"#000000\", \"accentColor\": \"#39E508\", \"fontSize\": 68}" )" \
              --codec=h264 \
              --concurrency=2 \
              --log=error || echo "⚠️ Failed to render $BASENAME"
          done
          
          echo "✅ Caption rendering complete"

      # ─────────────────────────────────────────────────────────────
      # 8. Generate Thumbnails
      # ─────────────────────────────────────────────────────────────
      - name: Generate thumbnails
        run: |
          echo "🖼️ Generating thumbnails..."
          
          for clip in workspace/captioned/*_captioned.mp4; do
            BASENAME=$(basename "$clip" _captioned.mp4)
            
            # Extract frame at 2 seconds as thumbnail
            ffmpeg -i "$clip" -ss 2 -vframes 1 \
              -vf "scale=1080:1920:force_original_aspect_ratio=decrease,pad=1080:1920:(ow-iw)/2:(oh-ih)/2" \
              "workspace/thumbnails/${BASENAME}_thumb.jpg" \
              -y -loglevel warning
          done
          
          echo "✅ Thumbnails generated"

      # ─────────────────────────────────────────────────────────────
      # 9. Upload to Google Drive
      # ─────────────────────────────────────────────────────────────
      - name: Upload to Google Drive
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          echo "☁️ Uploading to Google Drive..."
          
          python3 << 'PYTHON'
          import json, os
          from google.oauth2 import service_account
          from googleapiclient.discovery import build
          from googleapiclient.http import MediaFileUpload
          
          # Auth
          key_json = json.loads(os.environ['GOOGLE_SERVICE_ACCOUNT_KEY'])
          creds = service_account.Credentials.from_service_account_info(
              key_json, scopes=['https://www.googleapis.com/auth/drive.file']
          )
          drive = build('drive', 'v3', credentials=creds)
          
          folder_id = os.environ['GDRIVE_FOLDER_ID']
          job_id = "${{ inputs.job_id }}"
          
          # Create job subfolder
          job_folder = drive.files().create(body={
              'name': f'ClipMint-{job_id}',
              'mimeType': 'application/vnd.google-apps.folder',
              'parents': [folder_id]
          }).execute()
          job_folder_id = job_folder['id']
          
          uploaded = []
          
          # Upload captioned clips
          for f in sorted(os.listdir('workspace/captioned')):
              if not f.endswith('.mp4'): continue
              path = f'workspace/captioned/{f}'
              media = MediaFileUpload(path, mimetype='video/mp4', resumable=True)
              file = drive.files().create(
                  body={'name': f, 'parents': [job_folder_id]},
                  media_body=media
              ).execute()
              
              # Make publicly accessible
              drive.permissions().create(
                  fileId=file['id'],
                  body={'type': 'anyone', 'role': 'reader'}
              ).execute()
              
              url = f"https://drive.google.com/file/d/{file['id']}/view"
              uploaded.append({'name': f, 'url': url, 'id': file['id']})
              print(f"  ✅ Uploaded: {f}")
          
          # Upload thumbnails
          for f in sorted(os.listdir('workspace/thumbnails')):
              if not f.endswith('.jpg'): continue
              path = f'workspace/thumbnails/{f}'
              media = MediaFileUpload(path, mimetype='image/jpeg')
              file = drive.files().create(
                  body={'name': f, 'parents': [job_folder_id]},
                  media_body=media
              ).execute()
              drive.permissions().create(
                  fileId=file['id'],
                  body={'type': 'anyone', 'role': 'reader'}
              ).execute()
          
          # Save upload manifest
          with open('workspace/upload_manifest.json', 'w') as f:
              json.dump({'job_id': job_id, 'folder_id': job_folder_id, 'clips': uploaded}, f, indent=2)
          
          print(f"✅ All files uploaded to folder: {job_folder_id}")
          PYTHON

      # ─────────────────────────────────────────────────────────────
      # 10. Update Supabase Job Status
      # ─────────────────────────────────────────────────────────────
      - name: Update job status
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "📊 Updating job status in Supabase..."
          
          MANIFEST=$(cat workspace/upload_manifest.json)
          CLIPS_COUNT=$(echo "$MANIFEST" | python3 -c "import sys,json; print(len(json.load(sys.stdin)['clips']))")
          
          # Update job status to 'done'
          curl -s -X PATCH "$SUPABASE_URL/rest/v1/jobs?id=eq.${{ inputs.job_id }}" \
            -H "apikey: $SUPABASE_SERVICE_KEY" \
            -H "Authorization: Bearer $SUPABASE_SERVICE_KEY" \
            -H "Content-Type: application/json" \
            -H "Prefer: return=minimal" \
            -d "{
              \"status\": \"done\",
              \"clips_count\": $CLIPS_COUNT,
              \"drive_folder_id\": $(echo "$MANIFEST" | python3 -c "import sys,json; print(json.dumps(json.load(sys.stdin)['folder_id']))"),
              \"completed_at\": \"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"
            }"
          
          # Insert clip records
          echo "$MANIFEST" | python3 -c "
          import sys, json, subprocess
          data = json.load(sys.stdin)
          for i, clip in enumerate(data['clips']):
              body = json.dumps({
                  'job_id': data['job_id'],
                  'clip_index': i,
                  'filename': clip['name'],
                  'drive_file_id': clip['id'],
                  'drive_url': clip['url'],
                  'status': 'ready'
              })
              subprocess.run([
                  'curl', '-s', '-X', 'POST',
                  '${{ env.SUPABASE_URL }}/rest/v1/clips',
                  '-H', 'apikey: ${{ env.SUPABASE_SERVICE_KEY }}',
                  '-H', 'Authorization: Bearer ${{ env.SUPABASE_SERVICE_KEY }}',
                  '-H', 'Content-Type: application/json',
                  '-H', 'Prefer: return=minimal',
                  '-d', body
              ], check=True)
          print(f'✅ Inserted {len(data[\"clips\"])} clip records')
          "
          
          echo "✅ Job status updated"

      # ─────────────────────────────────────────────────────────────
      # 11. Send Notification
      # ─────────────────────────────────────────────────────────────
      - name: Send completion notification
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          STATUS="${{ job.status }}"
          JOB_ID="${{ inputs.job_id }}"
          
          if [ "$STATUS" = "success" ]; then
            EMOJI="✅"
            MSG="ClipMint job **$JOB_ID** completed successfully!"
          else
            EMOJI="❌"
            MSG="ClipMint job **$JOB_ID** failed. Check GitHub Actions logs."
          fi
          
          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d "{\"content\": \"$EMOJI $MSG\"}"
          fi
