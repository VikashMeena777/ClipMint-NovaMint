# ClipMint — System Health Check
#
# Runs daily to verify API quotas, storage, and system health.
#
name: Health Check

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 6 AM UTC (11:30 AM IST)
  workflow_dispatch: # Manual trigger

jobs:
  health:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Check Groq API
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
        run: |
          echo "🧠 Checking Groq API..."

          if [ -z "$GROQ_API_KEY" ]; then
            echo "⚠️ Groq API: GROQ_API_KEY secret not set"
            exit 0
          fi

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            -X POST "https://api.groq.com/openai/v1/chat/completions" \
            -H "Authorization: Bearer $GROQ_API_KEY" \
            -H "Content-Type: application/json" \
            -d '{"model":"llama-3.3-70b-versatile","messages":[{"role":"user","content":"ping"}],"max_tokens":5}')

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Groq API: OK"
          else
            echo "❌ Groq API: HTTP $RESPONSE"
          fi

      - name: Check Supabase
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: |
          echo "🗄️ Checking Supabase..."

          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_SERVICE_KEY" ]; then
            echo "❌ Supabase: SUPABASE_URL or SUPABASE_SERVICE_KEY secret not set!"
            echo "   Go to: https://github.com/${{ github.repository }}/settings/secrets/actions"
            echo "   Add: SUPABASE_URL and SUPABASE_SERVICE_KEY"
            exit 1
          fi

          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/" \
            -H "apikey: $SUPABASE_SERVICE_KEY")

          if [ "$RESPONSE" = "200" ]; then
            echo "✅ Supabase: OK"
          else
            echo "❌ Supabase: HTTP $RESPONSE"
          fi

      - name: Check rclone config
        env:
          RCLONE_CONF_B64: ${{ secrets.RCLONE_CONF_B64 }}
          GDRIVE_FOLDER_ID: ${{ secrets.GDRIVE_FOLDER_ID }}
        run: |
          echo "☁️ Checking Google Drive (rclone)..."

          if [ -z "$RCLONE_CONF_B64" ]; then
            echo "⚠️ Google Drive: RCLONE_CONF_B64 secret not set"
            exit 0
          fi

          if [ -z "$GDRIVE_FOLDER_ID" ]; then
            echo "⚠️ Google Drive: GDRIVE_FOLDER_ID secret not set"
            exit 0
          fi

          echo "✅ Google Drive: rclone config and folder ID are set"

      - name: Check GitHub Actions minutes
        run: |
          echo "⚙️ Checking GitHub Actions usage..."
          echo "ℹ️ GitHub Actions minutes are tracked at the account level."
          echo "   Free tier: 2,000 minutes/month"
          echo "   Check: https://github.com/settings/billing"

      - name: Summary report
        if: always()
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          echo "📊 Health check complete"

          if [ -n "$DISCORD_WEBHOOK" ]; then
            curl -s -X POST "$DISCORD_WEBHOOK" \
              -H "Content-Type: application/json" \
              -d '{"content": "🏥 ClipMint daily health check completed. See GitHub Actions logs for details."}'
          fi
