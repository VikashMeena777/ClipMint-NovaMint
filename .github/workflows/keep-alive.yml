name: Keep Supabase Alive

on:
  schedule:
    # Run every day at 6 AM UTC (11:30 AM IST)
    - cron: '0 6 * * *'
  workflow_dispatch: # Allow manual trigger

jobs:
  ping-supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Ping ClipMint Supabase
        run: |
          echo "🏓 Pinging ClipMint Supabase..."
          RESPONSE=$(curl -s -w "\n%{http_code}" \
            "https://zwgooqazqxqnfdgmhsev.supabase.co/rest/v1/profiles?select=count&limit=1" \
            -H "apikey: eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3Z29vcWF6cXhxbmZkZ21oc2V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDcxOTYsImV4cCI6MjA4ODMyMzE5Nn0.7KnhAaVTHXQGgHDjFaZUlnGvkCvFMCVpzQo-KNfptKk" \
            -H "Authorization: Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Inp3Z29vcWF6cXhxbmZkZ21oc2V2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI3NDcxOTYsImV4cCI6MjA4ODMyMzE5Nn0.7KnhAaVTHXQGgHDjFaZUlnGvkCvFMCVpzQo-KNfptKk")
          HTTP_CODE=$(echo "$RESPONSE" | tail -1)
          BODY=$(echo "$RESPONSE" | head -n -1)
          echo "Status: $HTTP_CODE"
          echo "Body: $BODY"
          if [ "$HTTP_CODE" -ge 200 ] && [ "$HTTP_CODE" -lt 300 ]; then
            echo "✅ ClipMint Supabase is alive!"
          else
            echo "❌ ClipMint ping failed with status $HTTP_CODE"
            exit 1
          fi

      - name: Summary
        run: |
          echo "================================================"
          echo "🎉 Keep-alive pings completed at $(date -u)"
          echo "================================================"
